<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Jogador</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <p class="kicker">Player hub</p>
        <h1 class="title">Central do Jogador</h1>
      </header>

      <section class="card hero-panel">
        <div>
          <p class="hero-label">Conta ativa</p>
          <h2 id="welcomeTitle">Bem-vindo(a)</h2>
          <p id="statusText" class="status">Carregando conta...</p>
        </div>
        <div class="hero-chip">Sessão segura</div>
      </section>

      <section class="card" style="margin-top: 12px">
        <div class="stats-row">
          <article class="stat-card">
            <span>Créditos disponíveis</span>
            <strong id="creditsHighlight">0.00</strong>
          </article>
          <article class="stat-card">
            <span>Status da conta</span>
            <strong id="activeHighlight">Ativa</strong>
          </article>
        </div>
      </section>

      <section class="card" style="margin-top: 12px">
        <p class="status">Dados da conta</p>
        <div class="grid">
          <div>
            <label>Email</label>
            <input id="emailField" type="text" readonly />
          </div>
          <div>
            <label>Perfil</label>
            <input id="roleField" type="text" readonly />
          </div>
          <div>
            <label>Creditos</label>
            <input id="creditsField" type="text" readonly />
          </div>
          <div>
            <label>Conta ativa</label>
            <input id="activeField" type="text" readonly />
          </div>
        </div>
        <div class="actions">
          <a href="/games.html" class="btn btn-primary" style="text-decoration:none;display:inline-block;">Menu de jogos</a>
          <button id="logoutButton" class="btn btn-danger">Sair</button>
        </div>
      </section>
    </div>
    <script src="./user.js"></script>
  </body>
</html>
