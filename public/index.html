<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login do Jogador</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <p class="kicker">Area do jogador</p>
        <h1 class="title">Login / Cadastro</h1>
      </header>

      <section class="card">
        <p id="statusText" class="status">Entre com seu email e senha.</p>
        <label>Email</label>
        <input id="emailInput" type="email" placeholder="voce@email.com" />
        <label>Senha</label>
        <input id="passwordInput" type="password" placeholder="******" />
        <div class="actions">
          <button id="registerButton" class="btn btn-primary">Criar conta</button>
          <button id="loginButton" class="btn btn-success">Entrar</button>
        </div>
      </section>
    </div>
    <script src="./login.js"></script>
  </body>
</html>
