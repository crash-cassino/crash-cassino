<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caça-níquel</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <p class="kicker">Slot Experience</p>
        <h1 class="title">Caça-níquel Neon</h1>
      </header>

      <section class="card slot-hero">
        <div class="slot-hero-art" aria-hidden="true"></div>
        <div class="slot-hero-content">
          <p class="hero-label">Rodada em destaque</p>
          <h2>Sinta a energia do giro</h2>
          <p id="statusText" class="status">Carregando conta...</p>
        </div>
      </section>

      <section class="card" style="margin-top: 12px;">
        <div class="grid">
          <div class="slot-input">
            <label>Saldo</label>
            <strong id="creditsField" class="slot-balance">0.00</strong>
          </div>
          <div class="slot-input">
            <label>Aposta por giro</label>
            <input id="wagerInput" type="number" min="1" step="1" value="10" />
          </div>
        </div>

        <div id="reelsWrap" class="slot-machine">
          <div id="reel1" class="slot-reel">🍒</div>
          <div id="reel2" class="slot-reel">🍋</div>
          <div id="reel3" class="slot-reel">🔔</div>
        </div>

        <div class="actions">
          <button id="spinButton" class="btn btn-primary slot-spin-btn">Girar Agora</button>
          <a href="/games.html" class="btn btn-success" style="text-decoration:none;display:inline-block;">Menu de jogos</a>
        </div>
      </section>
    </div>
    <script src="./slot.js"></script>
  </body>
</html>
